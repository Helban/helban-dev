<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Dziękuję · helban.dev</title>
  <meta name="theme-color" content="#0b0817">
  <!-- Nobody should arrive here from a search result: the page only makes sense straight
       after sending the form, and a thin "thanks" page in the index is a liability.
       Deliberately absent from sitemap.xml and from build_en.py for the same reason. -->
  <meta name="robots" content="noindex, follow">

  <!-- One page for both languages instead of a /en/ twin. Web3Forms takes a single
       absolute URL in the hidden redirect field and build_en.py rewrites href and src,
       never an input value, so a per-language target would need a new rule in the
       generator to serve a visitor who has JavaScript switched off. -->

  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="preload" href="../fonts/inter-800.woff2?v=3" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="../fonts/inter-400.woff2?v=3" as="font" type="font/woff2" crossorigin>

  <style>
/* === generated:begin — build/css/base.css, injected by build/build_css.py.
   Edit those files and re-run the build; do not edit this block. === */
/* ===================================================================
   base — tokens, reset and primitives shared by EVERY page.

   Injected into each page's <style> by build/build_css.py, so the
   served HTML still carries its CSS inline and nothing render-blocks.
   Edit here, run the build, never edit the generated block in a page.

   Font URLs are written relative to the site root; the injector
   rewrites the depth (fonts/ -> ../fonts/) per page.
   =================================================================== */

/* ---------------------------------------------------------------
   Self-hosted, subset Inter + JetBrains Mono (latin + latin-ext;
   Polish glyphs live in latin-ext). Replaces a render-blocking
   Google Fonts <link>, so first paint never waits on a stylesheet.
   --------------------------------------------------------------- */
@font-face{font-family:'Inter';font-style:normal;font-weight:400;font-display:swap;src:url(../fonts/inter-400.woff2?v=3) format('woff2');}
@font-face{font-family:'Inter';font-style:normal;font-weight:600;font-display:swap;src:url(../fonts/inter-600.woff2?v=3) format('woff2');}
@font-face{font-family:'Inter';font-style:normal;font-weight:700;font-display:swap;src:url(../fonts/inter-700.woff2?v=3) format('woff2');}
@font-face{font-family:'Inter';font-style:normal;font-weight:800;font-display:swap;src:url(../fonts/inter-800.woff2?v=3) format('woff2');}
@font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:500;font-display:swap;src:url(../fonts/jetbrains-mono-500.woff2?v=3) format('woff2');}
@font-face{font-family:'JetBrains Mono';font-style:normal;font-weight:700;font-display:swap;src:url(../fonts/jetbrains-mono-700.woff2?v=3) format('woff2');}

:root{
  --sans:'Inter',-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,"SF Mono",Menlo,monospace;

  --violet:#7C3AED; --violet-l:#a78bfa; --violet-ll:#c4b5fd;
  --coral:#F43F5E; --green:#22c55e; --green-d:#16a34a;
  --amber:#f59e0b; --red:#ef4444;

  --text:#f4f3fb; --ink:#ffffff; --muted:#9aa0b6;
  --line:rgba(255,255,255,.11);
  --line-strong:rgba(255,255,255,.18);
  --glass-1:rgba(255,255,255,.072);
  --glass-2:rgba(255,255,255,.022);

  /* Type scale, ratio 1.25 from a 10px root. The page once carried twenty distinct sizes,
     twelve of them inside 12-18px with steps as small as 1.06x: differences too small to
     read as hierarchy, large enough to read as carelessness. A first pass put everything
     on a 1.2 ladder, which killed the noise but still sat under the 1.25 floor a brand
     surface wants, and left body copy and card titles one thin step apart.
     At 1.25 the rungs are far enough apart that a step MEANS something, which is also why
     usage is assigned by ROLE rather than by rounding: at this ratio the nearest step
     would collapse card titles into the body copy underneath them.
     The rungs carry: 10 micro labels · 12.5 mono meta and badges · 15.6 body, controls and
     card copy · 19.5 card titles, section intros and pull quotes · 24.4 and up headings.
     Section prose deliberately shares 19.5 with card titles: it is a lede, weight and
     position separate them, and card copy still sits a full step below its own heading.
     Every rung is used except 47.7px, kept so the ladder stays a ladder. */
  --fs-1:10px; --fs-2:12.5px; --fs-3:15.6px; --fs-4:19.5px; --fs-5:24.4px;
  --fs-6:30.5px; --fs-7:38.1px; --fs-8:47.7px; --fs-9:59.6px;

  /* Home is the widest surface. Reading pages narrow this in their own block:
     920px for the list and policy pages, 860px for article bodies. */
  --maxw:1120px;
  --radius:18px; --radius-sm:12px; --radius-xs:9px;
  --shadow-card:0 18px 40px rgba(0,0,0,.46), inset 0 1px 0 rgba(255,255,255,.10);
  --shadow-pop:0 24px 60px rgba(0,0,0,.55);
  --space:8px;
}

*{box-sizing:border-box; margin:0; padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}

body{
  font-family:var(--sans); color:var(--text);
  background:#0b0817;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  line-height:1.6; overflow-x:hidden;
}

/* Mesh background, fixed so it doesn't repaint on scroll. This is the calm
   variant every reading page uses; the home page overrides it with a denser
   mesh plus a masked dot field tuned to its hero. */
.bg{position:fixed; inset:0; z-index:-2; pointer-events:none;
  background:
    radial-gradient(680px 460px at 6% -8%, rgba(139,92,246,.30), transparent 60%),
    radial-gradient(560px 420px at 96% 2%, rgba(99,102,241,.22), transparent 60%),
    radial-gradient(620px 520px at 88% 96%, rgba(244,63,94,.15), transparent 58%),
    linear-gradient(170deg,#181034 0%,#110c25 52%,#0b0817 100%);}

a{color:inherit; text-decoration:none}
img,svg{display:block}
:focus-visible{outline:2px solid var(--violet-l); outline-offset:3px; border-radius:6px}

.wrap{width:100%; max-width:var(--maxw); margin:0 auto; padding:0 22px}
/* === generated:end === */
/* A terminal page: no navigation and no language toggle, so it takes the base
   layer only. The bar here is a bare wordmark rather than the site shell, and
   the footer is one mono line, so both stay local. */
:root{--maxw:920px}
body{min-height:100vh; display:flex; flex-direction:column}

.topbar{border-bottom:1px solid var(--line)}
.topbar .wrap{display:flex; align-items:center; height:64px}
.brand{font-family:var(--mono); font-weight:700; font-size:var(--fs-4); letter-spacing:.3px; color:#efe9ff}
.brand .tld{color:var(--coral)}

main{flex:1; display:flex; align-items:center; padding:56px 0}
.said{max-width:52ch}
/* The tick is drawn, not typed: the fonts are subset to about 140 codepoints and a
   character like U+2713 is not among them, so it would render as an empty box. */
.tick{width:44px; height:44px; margin-bottom:22px}
.tick circle{fill:rgba(34,197,94,.14); stroke:var(--green); stroke-width:1.5}
.tick path{fill:none; stroke:var(--green); stroke-width:2.4; stroke-linecap:round; stroke-linejoin:round}
h1{font-size:clamp(28px,5vw,40px); font-weight:800; letter-spacing:-1px; line-height:1.1}
.said p{color:#c6c9d8; font-size:17px; margin-top:12px}
.said .en{margin-top:30px; padding-top:24px; border-top:1px solid var(--line)}
.said .en h2{font-size:19px; font-weight:700; color:#fff; letter-spacing:-.2px}
.said .en p{font-size:16px; margin-top:6px}
/* Weight 700 on both, because that is the only JetBrains Mono face this page loads:
   at the default 400 they would drop to the system monospace and stop matching the
   wordmark sitting right above them. */
.back{display:inline-block; margin-top:32px; font-family:var(--mono); font-weight:700; font-size:14px;
  color:var(--violet-ll); text-decoration:underline; text-underline-offset:4px}
.back:hover{color:#fff}

footer{border-top:1px solid var(--line); padding:22px 0}
footer .wrap{font-family:var(--mono); font-weight:700; font-size:var(--fs-2); color:var(--muted)}
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <header class="topbar">
    <div class="wrap">
      <a class="brand" href="/">helban<span class="tld">.dev</span></a>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div class="said">
        <svg class="tick" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="11"/>
          <path d="m7 12.4 3.2 3.2L17 8.8"/>
        </svg>
        <h1>Dziękuję, wiadomość dotarła.</h1>
        <p>Odezwę się wkrótce.</p>

        <div class="en" lang="en">
          <h2>Thanks, your message is in.</h2>
          <p>I'll get back to you soon.</p>
        </div>

        <a class="back" href="/">helban.dev</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="wrap">helban.dev</div>
  </footer>
</body>
</html>
